# @file buf.yaml
# @author dhjs0000
# @brief Buf 配置文件
# =============================================================================
# 版本: v0.1.0-alpha.3
# 功能: 配置 Buf 构建、lint 和 breaking 检测规则
# =============================================================================

version: v1

# Lint 配置
lint:
  use:
    - DEFAULT
  except:
    # 目录结构规则 - AAM 使用扁平化结构
    - PACKAGE_DIRECTORY_MATCH
    # 版本后缀规则 - alpha 阶段不强制版本后缀
    - PACKAGE_VERSION_SUFFIX
    # 枚举零值命名 - AAM 使用 NONE 而非 UNSPECIFIED
    - ENUM_ZERO_VALUE_SUFFIX
    # RPC 响应命名 - 流式响应使用 Event 后缀
    - RPC_RESPONSE_STANDARD_NAME
    # 同一目录多包规则 - AAM 按层级组织
    - DIRECTORY_SAME_PACKAGE
  enum_zero_value_suffix: _NONE
  rpc_allow_same_request_response: true
  service_suffix: Service

# Breaking 变更检测配置
breaking:
  use:
    - FILE
