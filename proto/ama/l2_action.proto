syntax = "proto3";

package aam.l2;

import "common/types.proto";

option csharp_namespace = "Aam.L2";
option go_package = "github.com/aam/proto/ama;l2";
option java_multiple_files = true;
option java_package = "com.aam.l2";

enum InputBackend {
    INPUT_BACKEND_UNSPECIFIED = 0;
    INPUT_BACKEND_ADB = 1;
    INPUT_BACKEND_WIN32_POSTMESSAGE = 2;
    INPUT_BACKEND_WIN32_SENDINPUT = 3;
    INPUT_BACKEND_MAA_FRAMEWORK = 4;
}

enum ActionStatus {
    ACTION_STATUS_UNSPECIFIED = 0;
    ACTION_STATUS_PENDING = 1;
    ACTION_STATUS_EXECUTING = 2;
    ACTION_STATUS_COMPLETED = 3;
    ACTION_STATUS_FAILED = 4;
    ACTION_STATUS_CANCELLED = 5;
    ACTION_STATUS_TIMEOUT = 6;
}

enum ActionPriority {
    ACTION_PRIORITY_UNSPECIFIED = 0;
    ACTION_PRIORITY_LOW = 1;
    ACTION_PRIORITY_NORMAL = 2;
    ACTION_PRIORITY_HIGH = 3;
    ACTION_PRIORITY_CRITICAL = 4;
}

message Point2D {
    double x = 1;
    double y = 2;
}

message TrajectoryPoint {
    Point2D position = 1;
    double timestamp_ms = 2;
    double velocity = 3;
    double acceleration = 4;
}

message Trajectory {
    repeated TrajectoryPoint points = 1;
    double total_duration_ms = 2;
    double total_distance_pixels = 3;
    string curve_type = 4;
    map<string, double> curve_params = 5;
}

message TouchAction {
    Point2D screen_position = 1;
    Point2D game_position = 2;
    aam.common.Position grid_position = 3;
    int32 duration_ms = 4;
    int32 pressure = 5;
    Trajectory trajectory = 6;
    bool use_trajectory = 7;
}

message SwipeAction {
    Point2D start_position = 1;
    Point2D end_position = 2;
    int32 duration_ms = 3;
    Trajectory trajectory = 4;
    bool use_trajectory = 5;
}

message TapAction {
    Point2D position = 1;
    int32 duration_ms = 2;
    int32 pressure = 3;
    int32 tap_count = 4;
    int32 tap_interval_ms = 5;
}

message DragAction {
    Point2D start_position = 1;
    Point2D end_position = 2;
    int32 duration_ms = 3;
    Trajectory trajectory = 4;
}

message PinchAction {
    Point2D center_position = 1;
    double start_distance = 2;
    double end_distance = 3;
    int32 duration_ms = 4;
}

message KeyAction {
    int32 key_code = 1;
    bool is_press = 2;
    int32 duration_ms = 3;
    repeated int32 modifiers = 4;
}

message DeployAction {
    string operator_id = 1;
    string operator_name = 2;
    aam.common.Position grid_position = 3;
    Point2D screen_position = 4;
    double facing_direction = 5;
    int32 expected_cost = 6;
    int32 timeout_ms = 7;
    bool wait_for_confirmation = 8;
}

message RetreatAction {
    string operator_id = 1;
    aam.common.Position grid_position = 2;
    Point2D screen_position = 3;
    bool confirm = 4;
    int32 timeout_ms = 5;
}

message SkillAction {
    string operator_id = 1;
    int32 skill_index = 2;
    Point2D operator_position = 3;
    bool auto_target = 4;
    Point2D target_position = 5;
    int32 timeout_ms = 6;
}

message WaitAction {
    int32 duration_ms = 1;
    string condition_type = 2;
    map<string, string> condition_params = 3;
    bool interruptible = 4;
}

message SpeedAction {
    bool speed_up = 1;
    int32 target_multiplier = 2;
}

message PauseAction {
    bool pause = 1;
}

message Action {
    string action_id = 1;
    aam.common.ActionType action_type = 2;
    ActionPriority priority = 3;
    int64 sequence_number = 4;
    aam.common.Timestamp created_at = 5;
    int32 timeout_ms = 6;
    int32 retry_count = 7;
    int32 retry_delay_ms = 8;
    map<string, string> metadata = 9;
    
    oneof action_data {
        TouchAction touch = 10;
        SwipeAction swipe = 11;
        TapAction tap = 12;
        DragAction drag = 13;
        PinchAction pinch = 14;
        KeyAction key = 15;
        DeployAction deploy = 16;
        RetreatAction retreat = 17;
        SkillAction skill = 18;
        WaitAction wait = 19;
        SpeedAction speed = 20;
        PauseAction pause = 21;
    }
}

message ActionResult {
    string action_id = 1;
    ActionStatus status = 2;
    aam.common.Timestamp start_time = 3;
    aam.common.Timestamp end_time = 4;
    int32 execution_time_ms = 5;
    string error_message = 6;
    aam.common.ErrorInfo error_info = 7;
    bool confirmation_received = 8;
    aam.common.PixelBuffer confirmation_screenshot = 9;
    map<string, string> result_data = 10;
}

message ActionRequest {
    string request_id = 1;
    Action action = 2;
    bool require_confirmation = 3;
    int32 confirmation_timeout_ms = 4;
    aam.common.Rectangle confirmation_roi = 5;
}

message ActionResponse {
    aam.common.Status status = 1;
    ActionResult result = 2;
}

message ActionBatchRequest {
    string batch_id = 1;
    repeated Action actions = 2;
    bool sequential = 3;
    bool stop_on_failure = 4;
    int32 batch_timeout_ms = 5;
}

message ActionBatchResponse {
    aam.common.Status status = 1;
    repeated ActionResult results = 2;
    int32 completed_count = 3;
    int32 failed_count = 4;
    int32 total_execution_time_ms = 5;
}

message InputConfig {
    InputBackend backend = 1;
    string device_id = 2;
    int32 screen_width = 3;
    int32 screen_height = 4;
    double scaling_factor = 5;
    int32 default_tap_duration_ms = 6;
    int32 default_swipe_duration_ms = 7;
    bool enable_trajectory = 8;
    double trajectory_variance = 9;
    int32 min_tap_interval_ms = 10;
    int32 max_actions_per_second = 11;
    map<string, string> backend_options = 12;
}

message ActionStatistics {
    uint64 total_actions = 1;
    uint64 successful_actions = 2;
    uint64 failed_actions = 3;
    uint64 cancelled_actions = 4;
    uint64 timeout_actions = 5;
    double average_execution_time_ms = 6;
    double p50_execution_time_ms = 7;
    double p99_execution_time_ms = 8;
    map<string, uint64> actions_by_type = 9;
    map<string, double> success_rate_by_type = 10;
}

message ActionQueueStatus {
    int32 pending_count = 1;
    int32 executing_count = 2;
    int32 max_queue_size = 3;
    Action current_action = 4;
    ActionStatistics statistics = 5;
    bool is_paused = 6;
}

message CoordinateMapping {
    int32 source_width = 1;
    int32 source_height = 2;
    int32 target_width = 3;
    int32 target_height = 4;
    repeated Point2D calibration_points = 5;
    repeated double transform_matrix = 6;
    string transform_type = 7;
}

message CalibrationData {
    string calibration_id = 1;
    CoordinateMapping screen_to_game = 2;
    CoordinateMapping game_to_screen = 3;
    aam.common.Timestamp calibrated_at = 4;
    string device_model = 5;
    string resolution = 6;
    double accuracy_score = 7;
    map<string, string> metadata = 8;
}

message FeedbackLoopConfig {
    bool enabled = 1;
    int32 confirmation_delay_ms = 2;
    int32 max_retries = 3;
    string confirmation_method = 4;
    aam.common.Rectangle confirmation_roi = 5;
    repeated string confirmation_keywords = 6;
}

message HumanizationConfig {
    bool enabled = 1;
    double timing_variance_ms = 2;
    double position_variance_pixels = 3;
    bool use_bezier_curves = 4;
    int32 min_pause_between_actions_ms = 5;
    int32 max_pause_between_actions_ms = 6;
    bool simulate_fatigue = 7;
    double fatigue_factor = 8;
}

message ActionExecutorConfig {
    InputConfig input_config = 1;
    FeedbackLoopConfig feedback_config = 2;
    HumanizationConfig humanization_config = 3;
    CalibrationData calibration = 4;
    int32 max_concurrent_actions = 5;
    int32 action_timeout_ms = 6;
}
