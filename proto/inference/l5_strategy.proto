syntax = "proto3";

package aam.inference;

import "common/types.proto";
import "ama/l1_perception.proto";
import "ama/l2_action.proto";
import "ama/l3_tactical.proto";
import "ama/l4_state.proto";

option csharp_namespace = "Aam.Inference";
option go_package = "github.com/aam/proto/inference;inference";
option java_multiple_files = true;
option java_package = "com.aam.inference";

enum LLMProvider {
    LLM_PROVIDER_UNSPECIFIED = 0;
    LLM_PROVIDER_OPENAI = 1;
    LLM_PROVIDER_ANTHROPIC = 2;
    LLM_PROVIDER_GOOGLE = 3;
    LLM_PROVIDER_LOCAL = 4;
    LLM_PROVIDER_AZURE = 5;
    LLM_PROVIDER_CUSTOM = 6;
}

enum ModelType {
    MODEL_TYPE_UNSPECIFIED = 0;
    MODEL_TYPE_GPT4_VISION = 1;
    MODEL_TYPE_GPT4O = 2;
    MODEL_TYPE_CLAUDE_3_OPUS = 3;
    MODEL_TYPE_CLAUDE_3_SONNET = 4;
    MODEL_TYPE_CLAUDE_3_HAIKU = 5;
    MODEL_TYPE_GEMINI_PRO_VISION = 6;
    MODEL_TYPE_LLAMA_VISION = 7;
    MODEL_TYPE_QWEN_VL = 8;
    MODEL_TYPE_CUSTOM = 99;
}

enum DecisionType {
    DECISION_TYPE_UNSPECIFIED = 0;
    DECISION_TYPE_DEPLOY = 1;
    DECISION_TYPE_RETREAT = 2;
    DECISION_TYPE_SKILL = 3;
    DECISION_TYPE_WAIT = 4;
    DECISION_TYPE_SPEED_CHANGE = 5;
    DECISION_TYPE_PAUSE = 6;
    DECISION_TYPE_EMERGENCY = 7;
    DECISION_TYPE_NONE = 8;
}

enum ReasoningType {
    REASONING_TYPE_UNSPECIFIED = 0;
    REASONING_TYPE_DIRECT = 1;
    REASONING_TYPE_CHAIN_OF_THOUGHT = 2;
    REASONING_TYPE_TREE_OF_THOUGHTS = 3;
    REASONING_TYPE_REACT = 4;
    REASONING_TYPE_REFLECTION = 5;
}

message LLMConfig {
    LLMProvider provider = 1;
    ModelType model_type = 2;
    string model_name = 3;
    string api_key = 4;
    string api_endpoint = 5;
    string api_version = 6;
    
    double temperature = 7;
    int32 max_tokens = 8;
    double top_p = 9;
    double frequency_penalty = 10;
    double presence_penalty = 11;
    
    int32 timeout_ms = 12;
    int32 max_retries = 13;
    int32 retry_delay_ms = 14;
    
    bool enable_vision = 15;
    bool enable_streaming = 16;
    bool enable_caching = 17;
    
    map<string, string> custom_headers = 18;
    map<string, string> custom_parameters = 19;
}

message PromptTemplate {
    string template_id = 1;
    string name = 2;
    string description = 3;
    string system_prompt = 4;
    string user_prompt_template = 5;
    repeated string example_inputs = 6;
    repeated string example_outputs = 7;
    
    ReasoningType reasoning_type = 8;
    int32 max_reasoning_steps = 9;
    
    map<string, string> variables = 10;
    map<string, string> metadata = 11;
}

message GameContext {
    aam.l4.BattleState battle_state = 1;
    aam.l1.PerceptionResult perception = 2;
    aam.l3.TacticalSituation situation = 3;
    aam.l3.TacticalLevel level_info = 4;
    
    repeated aam.l1.OperatorInstance available_operators = 5;
    repeated aam.l1.EnemyInstance visible_enemies = 6;
    
    double time_remaining_estimate = 7;
    int32 threats_count = 8;
    int32 opportunities_count = 9;
    
    string current_objective = 10;
    repeated string completed_objectives = 11;
    
    map<string, string> additional_context = 12;
}

message VisionInput {
    aam.common.PixelBuffer screenshot = 1;
    aam.common.ImageMetadata metadata = 2;
    repeated aam.common.Rectangle regions_of_interest = 3;
    repeated aam.common.DetectionResult detections = 4;
    repeated aam.l1.TextDetection text_detections = 5;
}

message StrategyRequest {
    string request_id = 1;
    string session_id = 2;
    
    GameContext context = 3;
    VisionInput vision = 4;
    
    string query = 5;
    DecisionType preferred_decision_type = 6;
    
    PromptTemplate custom_prompt = 7;
    bool require_explanation = 8;
    bool require_confidence = 9;
    
    aam.common.Timestamp request_time = 10;
    int32 timeout_ms = 11;
}

message StrategyResponse {
    string response_id = 1;
    string request_id = 2;
    
    aam.common.Status status = 3;
    
    Decision decision = 4;
    repeated Decision alternative_decisions = 5;
    
    string reasoning = 6;
    string chain_of_thought = 7;
    
    double confidence = 8;
    double latency_ms = 9;
    
    TokenUsage token_usage = 10;
    ModelInfo model_info = 11;
    
    aam.common.Timestamp response_time = 12;
}

message Decision {
    string decision_id = 1;
    DecisionType decision_type = 2;
    
    oneof action_data {
        DeployDecision deploy = 3;
        RetreatDecision retreat = 4;
        SkillDecision skill = 5;
        WaitDecision wait = 6;
        SpeedDecision speed = 7;
        PauseDecision pause = 8;
    }
    
    double confidence = 9;
    int32 priority = 10;
    string explanation = 11;
    
    repeated string preconditions = 12;
    repeated string expected_outcomes = 13;
    repeated string risks = 14;
    
    map<string, string> metadata = 15;
}

message DeployDecision {
    string operator_id = 1;
    string operator_name = 2;
    aam.common.Position grid_position = 3;
    double facing_direction = 4;
    int32 expected_cost = 5;
    string rationale = 6;
}

message RetreatDecision {
    string operator_id = 1;
    string operator_name = 2;
    string rationale = 3;
    bool is_emergency = 4;
}

message SkillDecision {
    string operator_id = 1;
    string operator_name = 2;
    int32 skill_index = 3;
    string rationale = 4;
    string target_description = 5;
}

message WaitDecision {
    double duration_ms = 1;
    string wait_reason = 2;
    string resume_condition = 3;
}

message SpeedDecision {
    bool speed_up = 1;
    int32 target_multiplier = 2;
    string rationale = 3;
}

message PauseDecision {
    bool pause = 1;
    string rationale = 2;
}

message TokenUsage {
    int32 prompt_tokens = 1;
    int32 completion_tokens = 2;
    int32 total_tokens = 3;
    double prompt_tokens_cost = 4;
    double completion_tokens_cost = 5;
    double total_cost = 6;
}

message ModelInfo {
    string model_name = 1;
    string provider = 2;
    string version = 3;
    aam.common.Timestamp request_time = 4;
    double latency_ms = 5;
}

message StrategyConfig {
    LLMConfig llm_config = 1;
    PromptTemplate default_prompt = 2;
    
    double min_confidence_threshold = 3;
    int32 max_alternatives = 4;
    bool enable_self_correction = 5;
    int32 max_self_correction_attempts = 6;
    
    bool enable_caching = 7;
    int32 cache_ttl_seconds = 8;
    
    bool enable_fallback = 9;
    LLMConfig fallback_config = 10;
    
    map<string, PromptTemplate> prompt_templates = 11;
    map<string, string> decision_rules = 12;
}

message LearningExample {
    string example_id = 1;
    GameContext context = 2;
    VisionInput vision = 3;
    Decision correct_decision = 4;
    string explanation = 5;
    string source = 6;
    aam.common.Timestamp created_at = 7;
    int32 quality_score = 8;
}

message StrategyModel {
    string model_id = 1;
    string name = 2;
    string version = 3;
    
    repeated LearningExample training_examples = 4;
    repeated LearningExample validation_examples = 5;
    
    double accuracy = 6;
    double precision = 7;
    double recall = 8;
    double f1_score = 9;
    
    aam.common.Timestamp trained_at = 10;
    aam.common.Timestamp updated_at = 11;
    
    map<string, double> performance_metrics = 12;
}

message BatchStrategyRequest {
    string batch_id = 1;
    repeated StrategyRequest requests = 2;
    bool parallel_execution = 3;
    int32 max_parallelism = 4;
    bool share_context = 5;
}

message BatchStrategyResponse {
    string batch_id = 1;
    aam.common.Status status = 2;
    repeated StrategyResponse responses = 3;
    double total_latency_ms = 4;
    TokenUsage total_token_usage = 5;
}

message StrategyFeedback {
    string decision_id = 1;
    string request_id = 2;
    
    bool decision_executed = 3;
    bool outcome_successful = 4;
    string outcome_description = 5;
    
    int32 outcome_score = 6;
    string feedback_text = 7;
    
    aam.common.Timestamp feedback_time = 8;
    double time_since_decision_ms = 9;
    
    map<string, string> additional_metrics = 10;
}

message StrategyStatistics {
    string session_id = 1;
    aam.common.Timestamp period_start = 2;
    aam.common.Timestamp period_end = 3;
    
    int32 total_requests = 4;
    int32 successful_requests = 5;
    int32 failed_requests = 6;
    int32 timeout_requests = 7;
    
    double average_latency_ms = 8;
    double p50_latency_ms = 9;
    double p99_latency_ms = 10;
    
    TokenUsage total_token_usage = 11;
    double total_cost = 12;
    
    map<string, int32> decisions_by_type = 13;
    map<string, double> average_confidence_by_type = 14;
    
    double overall_success_rate = 15;
    double average_outcome_score = 16;
}

message HealthStatus {
    bool is_healthy = 1;
    string status_message = 2;
    
    bool llm_available = 3;
    double llm_latency_ms = 4;
    
    int32 queue_size = 5;
    int32 active_requests = 6;
    
    map<string, string> component_status = 7;
    aam.common.Timestamp check_time = 8;
}
