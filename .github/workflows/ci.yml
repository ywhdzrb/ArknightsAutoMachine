# @file ci.yml
# @author dhjs0000
# @brief Continuous Integration Workflow for AAM
# =============================================================================
# 版本: v0.1.0-alpha.3
# 功能: 三平台构建矩阵（Windows/Linux/macOS）
# 触发: PR 到 main 分支 或 推送到 main 分支
# =============================================================================

name: CI

on:
  push:
    branches: [ main, develop, 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # vcpkg 2026.03.18 Release - 包含 protobuf 3.20+ 兼容性修复和 MSVC constinit 支持
  # 更新策略: 每季度检查 vcpkg 发布说明，验证关键依赖（protobuf, grpc, spdlog）兼容性后升级
  VCPKG_COMMIT: 'c3867e714dd3a51c272826eea77267876517ed99'

jobs:
  # ============================================================================
  # 代码风格检查
  # ============================================================================
  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run clang-format
        uses: jidicula/clang-format-action@v4.11.0
        with:
          clang-format-version: '21'
          check-path: 'core'
          fallback-style: 'LLVM'

      # bridge/ 目录在 v0.7.0-beta 阶段启用，当前跳过
      # - name: Run clang-format on bridge
      #   uses: jidicula/clang-format-action@v4.11.0
      #   with:
      #     clang-format-version: '21'
      #     check-path: 'bridge'
      #     fallback-style: 'LLVM'

      - name: Check CMake formatting
        run: |
          pip install cmakelang
          find . \( -name "CMakeLists.txt" -o -name "*.cmake" \) | grep -v "vcpkg_installed" | grep -v "vcpkg/" | xargs -I {} cmake-lint {} || echo "No CMake files to lint or linting completed with warnings"

  # ============================================================================
  # 协议兼容性检查
  # ============================================================================
  proto-check:
    name: Protocol Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.29.0'

      - name: Buf Lint
        run: buf lint
        working-directory: ${{ github.workspace }}/proto

      - name: Fetch target branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Buf Breaking Change Detection
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}/proto
        run: |
          # 获取目标分支（支持 main 或 master）
          TARGET_BRANCH="${{ github.base_ref }}"
          echo "Checking breaking changes against branch: $TARGET_BRANCH"
          buf breaking --against "../.git#branch=${TARGET_BRANCH},subdir=proto"

  # ============================================================================
  # Windows 构建
  # ============================================================================
  build-windows:
    name: Build (Windows)
    runs-on: windows-2022
    needs: [lint, proto-check]
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
        build_type: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure vcpkg submodule
        run: |
          git submodule update --init --recursive
          if (-not (Test-Path "${{ github.workspace }}/vcpkg")) {
            Write-Error "vcpkg directory not found after submodule update"
            exit 1
          }

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgJsonGlob: 'vcpkg.json'
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure CMake
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          $vcpkgToolchain = Join-Path -Path "${{ github.workspace }}" -ChildPath "vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgToolchain" `
            -DAAM_BUILD_TESTS=ON `
            -DAAM_ENABLE_CUDA=OFF `
            -DCMAKE_CXX_FLAGS="/W4 /WX"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel 4

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure --parallel 4

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aam-windows-${{ matrix.arch }}-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/*.lib
            build/${{ matrix.build_type }}/*.dll
            build/${{ matrix.build_type }}/*.exe
          retention-days: 7

  # ============================================================================
  # Linux 构建
  # ============================================================================
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    needs: [lint, proto-check]
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-12, clang-16]
        build_type: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Clang
        if: matrix.compiler == 'clang-16'
        run: |
          chmod +x scripts/setup/install_clang.sh
          sudo ./scripts/setup/install_clang.sh 16

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            pkg-config \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            ${{ matrix.compiler == 'gcc-12' && 'g++-12' || 'clang-16' }} \
            libopencv-dev \
            libeigen3-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            protobuf-compiler-grpc \
            libspdlog-dev \
            libfmt-dev \
            libyaml-cpp-dev \
            nlohmann-json3-dev \
            libzmq3-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'

      - name: Configure CMake
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          export CC=${{ matrix.compiler == 'gcc-12' && 'gcc-12' || 'clang-16' }}
          export CXX=${{ matrix.compiler == 'gcc-12' && 'g++-12' || 'clang++-16' }}
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DAAM_BUILD_TESTS=ON \
            -DAAM_ENABLE_CUDA=OFF \
            -DAAM_ENABLE_SANITIZERS=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aam-linux-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            build/lib*.a
            build/lib*.so
          retention-days: 7

  # ============================================================================
  # macOS 构建
  # ============================================================================
  build-macos:
    name: Build (macOS)
    runs-on: macos-14
    needs: [lint, proto-check]
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install \
            cmake \
            ninja \
            pkg-config \
            opencv \
            eigen \
            protobuf \
            grpc \
            spdlog \
            fmt \
            yaml-cpp \
            nlohmann-json \
            zeromq

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'

      - name: Configure CMake
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DAAM_BUILD_TESTS=ON \
            -DAAM_ENABLE_CUDA=OFF

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure --parallel $(sysctl -n hw.ncpu)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aam-macos-${{ matrix.build_type }}
          path: |
            build/lib*.a
            build/lib*.dylib
          retention-days: 7

  # ============================================================================
  # 构建状态汇总
  # ============================================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    if: always()
    steps:
      - name: Check Build Status
        run: |
          echo "Windows: ${{ needs.build-windows.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"
          echo "macOS: ${{ needs.build-macos.result }}"
          if [ "${{ needs.build-windows.result }}" != "success" ] || \
             [ "${{ needs.build-linux.result }}" != "success" ] || \
             [ "${{ needs.build-macos.result }}" != "success" ]; then
            echo "Build failed!"
            exit 1
          fi
          echo "All builds passed!"
